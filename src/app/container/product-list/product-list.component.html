<app-filter
  [all]="totalProductCount"
  [inStock]="totalProductInStock"
  [outOfStock]="totalProductOutOfStock"
  (selectedFilterRadioButtonChanged)="onFilterChanged($event)"
  ></app-filter>
<div class="ekart--products--container">
  <div *ngFor="let prod of products">
    <app-product
        [product]="prod"
        *ngIf="searchText === '' || prod.name.toLowerCase().includes(searchText)"
        >
        <!-- *ngIf="this.selectedFilterRadioButton === 'all' || prod.is_in_inventory.toString() === this.selectedFilterRadioButton" -->
    </app-product>
  </div>
</div>
